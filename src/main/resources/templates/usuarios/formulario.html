<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${usuario.id == null ? 'Nuevo usuario' : 'Editar usuario'}" th:if="${usuario.id != null}">Editar usuario</title>
    <title th:unless="${usuario.id != null}">Nuevo usuario</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>

<body class="panel-body">

    <div class="breadcrumb">
        <a th:href="@{/}">Sistema</a>
        <span>›</span>
        <a th:href="@{/usuarios}">Usuarios</a>
        <span>›</span>
        <strong th:text="${usuario.id == null ? 'Nuevo' : 'Editar'}"></strong>
    </div>

    <main class="panel-container">

        <div class="page-header">
            <div>
                <h1 th:text="${usuario.id == null ? 'Registrar Usuario' : 'Editar Usuario'}"></h1>
                <p>Complete la información del usuario</p>
            </div>
        </div>

        <section class="form-card">
            <form th:action="@{${usuario.id == null ? '/usuarios' : '/usuarios/' + usuario.id}}" method="post">

                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" name="username" th:value="${usuario.username}"
                        placeholder="nombre.usuario" required>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password"
                        th:attr="placeholder=${usuario.id == null ? 'Contraseña' : 'Dejar vacío para no cambiar'}">
                </div>

                <div class="form-group">
                    <label for="rol">Rol</label>
                    <select id="rol" name="rol">
                        <option th:each="r : ${roles}" th:value="${r.name()}" th:text="${r}"
                            th:selected="${usuario.rol == r}">
                        </option>
                    </select>
                </div>

                <div class="form-actions">
                    <a class="btn-secondary" th:href="@{/usuarios}">Cancelar</a>
                    <button type="submit" class="btn-primary">Guardar</button>
                </div>

            </form>
        </section>

    </main>

</body>

</html>
