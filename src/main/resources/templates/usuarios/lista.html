<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Usuarios</title>
</head>
<body>
    <h1>Gestión de Usuarios</h1>
    <a th:href="@{/usuarios/nuevo}">Nuevo usuario</a>
    <form th:action="@{/usuarios}" method="get">
        <input type="text" name="search" placeholder="Buscar por username"/>
        <button type="submit">Buscar</button>
    </form>
    <table border="1">
        <thead>
            <tr>
                <th>ID</th><th>Usuario</th><th>Rol</th><th>Activo</th><th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="u : ${usuarios}">
                <td th:text="${u.id}"></td>
                <td th:text="${u.username}"></td>
                <td th:text="${u.rol}"></td>
                <td th:text="${u.activo ? 'Sí' : 'No'}"></td>
                <td>
                    <a th:href="@{/usuarios/editar/{id}(id=${u.id})}">Editar</a>
                    <a th:href="@{/usuarios/desactivar/{id}(id=${u.id})}"
                       onclick="return confirm('¿Desactivar usuario?')">Desactivar</a>
                </td>
            </tr>
        </tbody>
    </table>
    <a th:href="@{/}">Volver al inicio</a>
</body>
</html>
