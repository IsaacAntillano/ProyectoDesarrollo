<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Usuarios</title>
</head>
<body>
    <h1>Gestión de Usuarios</h1>

    <a th:href="@{/usuarios/nuevo}">Nuevo usuario</a>
    <a th:href="@{/usuarios(mostrarTodos=true)}" style="margin-left: 20px;">Mostrar todos (incluye inactivos)</a>
    <a th:href="@{/usuarios}" style="margin-left: 20px;">Solo activos</a>

    <br/><br/>

    <form th:action="@{/usuarios}" method="get">
        <input type="text" name="search" placeholder="Buscar por username"/>
        <button type="submit">Buscar</button>
    </form>

    <br/>

    <table border="1">
        <thead>
            <tr>
                <th>ID</th>
                <th>Usuario</th>
                <th>Rol</th>
                <th>Activo</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="u : ${usuarios}">
                <td th:text="${u.id}"></td>
                <td th:text="${u.username}"></td>
                <td th:text="${u.rol}"></td>
                <td th:text="${u.activo ? 'Sí' : 'No'}"></td>
                <td>
                    <a th:href="@{/usuarios/editar/{id}(id=${u.id})}">Editar</a>

                    <span th:if="${u.activo}">
                        <a th:href="@{/usuarios/desactivar/{id}(id=${u.id})}"
                           onclick="return confirm('¿Desactivar usuario?')">Desactivar</a>
                    </span>
                    <span th:unless="${u.activo}">
                        <a th:href="@{/usuarios/reactivar/{id}(id=${u.id})}"
                           onclick="return confirm('¿Reactivar usuario?')">Reactivar</a>
                    </span>

                    <a th:href="@{/usuarios/eliminar/{id}(id=${u.id})}"
                       onclick="return confirm('¿Eliminar usuario definitivamente? Esta acción no se puede deshacer.')"
                       style="color: red; margin-left: 10px;">Eliminar</a>
                </td>
            </tr>
        </tbody>
    </table>

    <br/>
    <a th:href="@{/}">Volver al inicio</a>
</body>
</html>
