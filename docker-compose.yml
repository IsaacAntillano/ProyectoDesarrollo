version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: embobinados_db
    environment:
      POSTGRES_DB: embobinados_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - embobinados-net

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_embobinados
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - embobinados-net

volumes:
  pgdata:

networks:
  embobinados-net:
    driver: bridge